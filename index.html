<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Side by Side - Photo Combiner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f0f11;
            --surface: #18181b;
            --surface-2: #27272a;
            --border: #3f3f46;
            --text: #fafafa;
            --text-muted: #a1a1aa;
            --success: #22c55e;
            --radius: 12px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .header-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            margin-bottom: 0.5rem;
        }

        .header-title h1 {
            margin-bottom: 0;
        }

        .github-link {
            display: inline-flex;
            align-items: center;
            color: var(--text-muted);
            transition: color 0.2s ease;
            text-decoration: none;
        }

        .github-link:hover {
            color: var(--text);
        }

        .github-link svg {
            width: 22px;
            height: 22px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Editor stage: the canvas is the single preview surface; a transparent
           grid overlay on top of it handles upload / drag / paste / pan-zoom. */
        .workspace {
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .editor-stage {
            position: relative;
            display: inline-block;
            max-width: 100%;
            line-height: 0;
        }

        #previewCanvas {
            display: block;
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 72vh;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.3s ease;
        }

        .cell-overlay {
            position: absolute;
            inset: 0;
            display: grid;
            box-sizing: border-box;
        }

        .overlay-cell {
            position: relative;
            min-width: 0;
            min-height: 0;
            border: 2px dashed var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0.5rem;
            cursor: pointer;
            overflow: hidden;
            transition: border-color 0.2s ease, background 0.2s ease;
        }

        .overlay-cell:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.08);
        }

        .overlay-cell.has-image {
            border-color: transparent;
            background: transparent;
            cursor: grab;
        }

        .overlay-cell.has-image:active {
            cursor: grabbing;
        }

        .overlay-cell.drag-over {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.15);
        }

        .overlay-cell input {
            display: none;
        }

        .overlay-cell .upload-icon {
            width: 36px;
            height: 36px;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .overlay-cell p {
            color: var(--text-muted);
            font-size: 0.8rem;
            line-height: 1.15;
        }

        .overlay-cell .label {
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.15rem;
            font-size: 0.85rem;
        }

        .overlay-cell.has-image .upload-content {
            display: none;
        }

        .cell-overlay.dense .upload-icon {
            width: 22px;
            height: 22px;
            margin-bottom: 0.2rem;
        }

        .cell-overlay.dense .label,
        .cell-overlay.dense p {
            font-size: 0.65rem;
        }

        .remove-image-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2;
            transition: background 0.2s ease, transform 0.15s ease;
        }

        .remove-image-btn svg {
            width: 14px;
            height: 14px;
        }

        .overlay-cell.has-image .remove-image-btn {
            display: flex;
        }

        .remove-image-btn:hover {
            background: rgba(239, 68, 68, 0.9);
            transform: scale(1.1);
        }

        /* Controls Panel */
        .controls-panel {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 1.5rem;
            height: fit-content;
        }

        .controls-panel h2 {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .controls-panel h2 svg {
            width: 20px;
            height: 20px;
        }

        .control-group {
            margin-bottom: 1.5rem;
        }

        .control-group > label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        /* Direction Toggle */
        .direction-toggle {
            display: flex;
            background: var(--surface-2);
            border-radius: 8px;
            padding: 4px;
        }

        .direction-btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .direction-btn svg {
            width: 18px;
            height: 18px;
        }

        .direction-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Grid layout */
        select {
            width: 100%;
            padding: 0.6rem 0.75rem;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.9rem;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .custom-grid {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .custom-grid input[type="number"] {
            width: 52px;
            padding: 0.35rem 0.4rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 0.85rem;
            text-align: center;
        }

        .custom-grid span {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* Checkbox - label.checkbox-wrapper so it overrides .control-group > label { display: block } */
        label.checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
        }

        .checkbox-wrapper input {
            display: none;
        }

        .checkbox-custom {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .checkbox-wrapper input:checked + .checkbox-custom {
            background: var(--primary);
            border-color: var(--primary);
        }

        .checkbox-custom svg {
            width: 14px;
            height: 14px;
            color: white;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .checkbox-wrapper input:checked + .checkbox-custom svg {
            opacity: 1;
        }

        .checkbox-label {
            font-size: 0.95rem;
        }

        /* Border Options */
        .border-options {
            margin-top: 1rem;
            padding: 1rem;
            background: var(--surface-2);
            border-radius: 8px;
            display: none;
        }

        .border-options.visible {
            display: block;
        }

        .border-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .border-row:last-child {
            margin-bottom: 0;
        }

        .border-field {
            flex: 1;
        }

        .border-field label {
            font-size: 0.8rem;
            margin-bottom: 0.25rem;
            display: block;
            color: var(--text-muted);
        }

        /* Slider */
        .slider-wrapper {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: linear-gradient(to right, var(--primary) 0%, var(--primary) var(--progress, 10%), var(--bg) var(--progress, 10%), var(--bg) 100%);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            height: 4px;
            border-radius: 2px;
        }

        input[type="range"]::-moz-range-track {
            height: 4px;
            background: var(--bg);
            border-radius: 2px;
        }

        input[type="range"]::-moz-range-progress {
            background: var(--primary);
            height: 4px;
            border-radius: 2px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            margin-top: -6px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
        }

        .slider-value {
            min-width: 42px;
            padding: 0.25rem 0.5rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text);
            font-family: monospace;
            background: var(--bg);
            border-radius: 4px;
        }

        .color-input-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
        }

        input[type="color"] {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: none;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 4px;
        }

        .color-hex {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-family: monospace;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn svg {
            width: 20px;
            height: 20px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-success {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
            margin-top: 1rem;
        }

        .btn-success:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(34, 197, 94, 0.4);
        }

        .btn-success:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border);
            margin-top: 0.75rem;
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--border);
            transform: translateY(-2px);
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .shortcut-hint {
            margin-left: 0.5rem;
            padding: 0.2rem 0.4rem;
            font-size: 0.7rem;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            opacity: 0.8;
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-title">
                <h1>Side by Side</h1>
                <a href="https://github.com/dinhanhthi/side-by-side" target="_blank" rel="noopener noreferrer" class="github-link" aria-label="View source on GitHub" title="View on GitHub">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                </a>
            </div>
            <p class="subtitle">Combine any number of photos in flexible grids (2×1, 2×2, 3×3, or custom) with live editing. 100% offline, runs entirely in your browser.</p>
        </header>

        <div class="main-grid">
            <div class="workspace">
                <div class="editor-stage" id="editorStage">
                    <canvas id="previewCanvas"></canvas>
                    <div class="cell-overlay" id="cellOverlay"></div>
                </div>
            </div>

            <div class="controls-panel">
                <h2>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
                    </svg>
                    Options
                </h2>

                <div class="control-group">
                    <label>Grid layout</label>
                    <select id="gridSelect">
                        <option value="2,1">2 × 1</option>
                        <option value="1,2">1 × 2</option>
                        <option value="2,2">2 × 2</option>
                        <option value="3,2">3 × 2</option>
                        <option value="2,3">2 × 3</option>
                        <option value="3,3">3 × 3</option>
                    </select>
                    <div class="custom-grid">
                        <input type="number" id="customCols" value="2" min="1" max="6">
                        <span>×</span>
                        <input type="number" id="customRows" value="1" min="1" max="6">
                    </div>
                </div>

                <div class="control-group">
                    <label>Aspect ratio</label>
                    <select id="aspectSelect">
                        <option value="auto">Auto (from images)</option>
                        <option value="1:1">1:1 (Square)</option>
                        <option value="4:3">4:3</option>
                        <option value="3:2">3:2</option>
                        <option value="5:4">5:4</option>
                        <option value="16:9">16:9</option>
                        <option value="21:9">21:9 (Ultrawide)</option>
                        <option value="2:1">2:1</option>
                        <option value="3:4">3:4 (Portrait)</option>
                        <option value="2:3">2:3</option>
                        <option value="9:16">9:16</option>
                        <option value="4:5">4:5</option>
                        <option value="5:7">5:7</option>
                        <option value="1:2">1:2</option>
                    </select>
                </div>

                <div class="control-group" id="diagonalGroup" style="display:none;">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="diagonalToggle">
                        <span class="checkbox-custom">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                            </svg>
                        </span>
                        <span class="checkbox-label">Diagonal split</span>
                    </label>

                    <div id="diagonalDirSection" style="margin-top: 0.5rem; display: none;">
                        <label style="font-size: 0.72rem; color: var(--text-muted); display: block; margin-bottom: 0.3rem;">Direction</label>
                        <div class="direction-toggle" id="diagonalDirToggle">
                            <button class="direction-btn active" data-diag="tlbr" title="Top-left to bottom-right">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="2" width="20" height="20" rx="3" />
                                    <line x1="5" y1="5" x2="19" y2="19" />
                                </svg>
                            </button>
                            <button class="direction-btn" data-diag="trbl" title="Top-right to bottom-left">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="2" width="20" height="20" rx="3" />
                                    <line x1="19" y1="5" x2="5" y2="19" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="control-group">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="borderToggle">
                        <span class="checkbox-custom">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                            </svg>
                        </span>
                        <span class="checkbox-label">Add Border</span>
                    </label>

                    <div class="border-options" id="borderOptions">
                        <div class="border-row">
                            <div class="border-field">
                                <label>Width (px)</label>
                                <div class="slider-wrapper">
                                    <input type="range" id="borderWidth" value="0" min="0" max="100">
                                    <span class="slider-value" id="borderWidthValue">0px</span>
                                </div>
                            </div>
                        </div>
                        <div class="border-row">
                            <div class="border-field">
                                <label>Color</label>
                                <div class="color-input-wrapper">
                                    <input type="color" id="borderColor" value="#ffffff">
                                    <span class="color-hex" id="colorHex">#ffffff</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <button class="btn btn-success" id="downloadBtn" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    Download Result
                    <kbd class="shortcut-hint" id="shortcutHint">⌘D</kbd>
                </button>

                <button class="btn btn-secondary" id="copyBtn" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                    </svg>
                    <span id="copyBtnLabel">Copy to Clipboard</span>
                </button>
            </div>
        </div>

        <footer>
            <p>100% offline. No uploads, no tracking. Your photos never leave your device.</p>
        </footer>
    </div>

    <script>
        // State
        let images = [null, null];
        let imageTransforms = [];
        let cols = 2;
        let rows = 1;
        let lastPastedSlot = null;
        let useDiagonal = false;
        let diagonalDirection = 'tlbr'; // 'tlbr' = top-left to bottom-right (\), 'trbl' = top-right to bottom-left (/)
        let aspectRatio = 'auto';
        let hasBorder = false;
        let borderWidth = 0;
        let borderColor = '#ffffff';
        const MAX_DIM = 6;
        const MAX_TOTAL = 12;

        // DOM Elements
        const editorStage = document.getElementById('editorStage');
        const cellOverlay = document.getElementById('cellOverlay');
        const previewCanvas = document.getElementById('previewCanvas');
        const downloadBtn = document.getElementById('downloadBtn');
        const copyBtn = document.getElementById('copyBtn');
        const copyBtnLabel = document.getElementById('copyBtnLabel');
        const borderToggle = document.getElementById('borderToggle');
        const borderOptions = document.getElementById('borderOptions');
        const borderWidthInput = document.getElementById('borderWidth');
        const borderColorInput = document.getElementById('borderColor');
        const colorHex = document.getElementById('colorHex');
        const gridSelect = document.getElementById('gridSelect');
        const customCols = document.getElementById('customCols');
        const customRows = document.getElementById('customRows');
        const aspectSelect = document.getElementById('aspectSelect');
        const diagonalGroup = document.getElementById('diagonalGroup');
        const diagonalToggle = document.getElementById('diagonalToggle');
        const diagonalDirToggle = document.getElementById('diagonalDirToggle');
        const diagonalDirSection = document.getElementById('diagonalDirSection');

        function getTotalSlots() {
            return cols * rows;
        }

        // Build the transparent interaction grid that sits on top of the canvas.
        // Each cell handles click-to-upload, drag/drop, remove, and pan/zoom for its slot.
        function buildOverlay() {
            if (!cellOverlay) return;
            const total = getTotalSlots();

            cellOverlay.style.gridTemplateColumns = `repeat(${cols}, minmax(0, 1fr))`;
            cellOverlay.style.gridTemplateRows = `repeat(${rows}, minmax(0, 1fr))`;
            cellOverlay.classList.toggle('dense', total > 4);
            cellOverlay.innerHTML = '';

            for (let i = 0; i < total; i++) {
                const cell = document.createElement('div');
                cell.className = 'overlay-cell';
                if (images[i]) cell.classList.add('has-image');

                cell.innerHTML = `
                    <input type="file" accept="image/*">
                    <div class="upload-content">
                        <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <p class="label">Photo ${i + 1}</p>
                        <p>Click, drag, or paste</p>
                    </div>
                    <button class="remove-image-btn" type="button" data-index="${i}" aria-label="Remove photo ${i + 1}" title="Remove photo">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                `;

                const fileInput = cell.querySelector('input[type="file"]');
                const removeBtn = cell.querySelector('.remove-image-btn');

                cell.addEventListener('click', (e) => {
                    if (e.target.closest('.remove-image-btn')) return;
                    if (images[i]) return; // filled → drag to pan instead of re-uploading
                    fileInput.click();
                });

                cell.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    cell.classList.add('drag-over');
                });
                cell.addEventListener('dragleave', () => cell.classList.remove('drag-over'));
                cell.addEventListener('drop', (e) => {
                    e.preventDefault();
                    cell.classList.remove('drag-over');
                    const file = e.dataTransfer.files[0];
                    if (file && file.type.startsWith('image/')) loadFileToSlot(file, i);
                });

                fileInput.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) loadFileToSlot(file, i);
                });

                removeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    removeImage(i);
                });

                attachCellInteractivity(cell, i);
                cellOverlay.appendChild(cell);
            }

            syncOverlay();
        }

        // Toggle per-cell filled state and match the overlay gap to the border thickness.
        function syncOverlay() {
            if (!cellOverlay) return;
            cellOverlay.querySelectorAll('.overlay-cell').forEach((cell, i) => {
                cell.classList.toggle('has-image', !!images[i]);
            });
            const border = hasBorder ? borderWidth : 0;
            const rect = previewCanvas.getBoundingClientRect();
            const scale = (rect.width && previewCanvas.width) ? rect.width / previewCanvas.width : 0;
            const gapPx = border * scale;
            cellOverlay.style.gap = gapPx + 'px';
            cellOverlay.style.padding = gapPx + 'px';
        }

        // Pan / zoom / reset for a slot, operating in target-canvas pixels so the
        // on-screen preview equals the exported image exactly (single coordinate space).
        function attachCellInteractivity(cell, index) {
            const scaleFactor = () => {
                const rect = previewCanvas.getBoundingClientRect();
                return rect.width ? (previewCanvas.width / rect.width) : 1;
            };
            const ensureT = () => {
                let t = imageTransforms[index];
                if (!t) { t = { scale: 1, panX: 0, panY: 0 }; imageTransforms[index] = t; }
                return t;
            };

            cell.addEventListener('wheel', (e) => {
                if (!images[index] || !currentLayout) return;
                e.preventDefault();
                const t = ensureT();
                const S = scaleFactor();
                const rect = previewCanvas.getBoundingClientRect();
                const cr = currentLayout.cells[index];
                const tx = (e.clientX - rect.left) * S;
                const ty = (e.clientY - rect.top) * S;
                const mx = tx - (cr.x + cr.w / 2);
                const my = ty - (cr.y + cr.h / 2);
                const factor = e.deltaY < 0 ? 1.12 : 0.89;
                const oldScale = t.scale;
                const newScale = Math.max(0.15, Math.min(10, oldScale * factor));
                const ratio = newScale / oldScale;
                t.panX = mx - (mx - t.panX) * ratio;
                t.panY = my - (my - t.panY) * ratio;
                t.scale = newScale;
                renderCanvas();
            }, { passive: false });

            let dragging = false, sx = 0, sy = 0, spx = 0, spy = 0, S = 1;
            const move = (e) => {
                if (!dragging) return;
                const t = ensureT();
                t.panX = spx + (e.clientX - sx) * S;
                t.panY = spy + (e.clientY - sy) * S;
                renderCanvas();
            };
            const up = () => {
                dragging = false;
                document.removeEventListener('mousemove', move);
                document.removeEventListener('mouseup', up);
            };
            cell.addEventListener('mousedown', (e) => {
                if (e.button !== 0 || !images[index]) return;
                if (e.target.closest('.remove-image-btn')) return;
                const t = ensureT();
                dragging = true;
                sx = e.clientX; sy = e.clientY; spx = t.panX; spy = t.panY;
                S = scaleFactor();
                document.addEventListener('mousemove', move);
                document.addEventListener('mouseup', up);
            });
            cell.addEventListener('dblclick', (e) => {
                if (!images[index]) return;
                e.stopPropagation();
                imageTransforms[index] = { scale: 1, panX: 0, panY: 0 };
                renderCanvas();
            });
        }

        function loadImageToSlot(index, dataUrl) {
            const img = new Image();
            img.onload = () => {
                images[index] = img;
                imageTransforms[index] = { scale: 1, panX: 0, panY: 0 };
                syncOverlay();
                updateUI();
            };
            img.src = dataUrl;
        }

        function loadFileToSlot(file, index) {
            const reader = new FileReader();
            reader.onload = (e) => loadImageToSlot(index, e.target.result);
            reader.readAsDataURL(file);
        }

        function removeImage(index) {
            images[index] = null;
            imageTransforms[index] = null;
            const cell = cellOverlay.querySelectorAll('.overlay-cell')[index];
            if (cell) {
                const fileInput = cell.querySelector('input[type="file"]');
                if (fileInput) fileInput.value = '';
            }
            syncOverlay();
            updateUI();
        }

        function getPasteTargetSlot() {
            const total = getTotalSlots();
            // Find first empty
            for (let i = 0; i < total; i++) {
                if (!images[i]) return i;
            }
            // All full: cycle from last
            if (lastPastedSlot == null) return 0;
            return (lastPastedSlot + 1) % total;
        }

        function handleClipboardImage(blob) {
            const slot = getPasteTargetSlot();
            const total = getTotalSlots();
            if (slot >= total) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                loadImageToSlot(slot, e.target.result);
                lastPastedSlot = slot;
            };
            reader.readAsDataURL(blob);
        }

        function updateUI() {
            const total = getTotalSlots();
            const hasAll = images.slice(0, total).every(img => !!img);
            renderCanvas();
            downloadBtn.disabled = !hasAll;
            copyBtn.disabled = !hasAll;
        }

        // Compute the composition layout in target-canvas pixels.
        // Returns { canvasW, canvasH, border, diagonal, cells:[{x,y,w,h}] }.
        function computeLayout() {
            const total = getTotalSlots();
            const border = hasBorder ? borderWidth : 0;

            let refImgs = images.slice(0, total).filter(Boolean);
            if (refImgs.length === 0) refImgs = [{ width: 600, height: 400 }];

            const size = getTargetCanvasSize(refImgs, cols, rows, border, aspectRatio);
            const innerW = size.width;
            const innerH = size.height;

            if (total === 2 && useDiagonal) {
                // one combined rect split diagonally; both slots share the full area
                const rect = { x: border, y: border, w: innerW, h: innerH };
                return {
                    canvasW: innerW + border * 2,
                    canvasH: innerH + border * 2,
                    border, diagonal: true,
                    cells: [rect, rect]
                };
            }

            const cellW = innerW / cols;
            const cellH = innerH / rows;
            const cells = [];
            for (let i = 0; i < total; i++) {
                const r = Math.floor(i / cols);
                const c = i % cols;
                cells.push({
                    x: border + c * (cellW + border),
                    y: border + r * (cellH + border),
                    w: cellW, h: cellH
                });
            }
            return {
                canvasW: innerW + (cols + 1) * border,
                canvasH: innerH + (rows + 1) * border,
                border, diagonal: false, cells
            };
        }

        // Draw one image inside a rect using cover-fit (fill + crop) + its transform.
        function drawCellImage(ctx, img, rect, t) {
            const tr = t || { scale: 1, panX: 0, panY: 0 };
            const base = Math.max(rect.w / img.width, rect.h / img.height) || 1;
            const ds = base * tr.scale;
            const dw = img.width * ds;
            const dh = img.height * ds;
            const dx = rect.x + (rect.w - dw) / 2 + tr.panX;
            const dy = rect.y + (rect.h - dh) / 2 + tr.panY;
            ctx.drawImage(img, dx, dy, dw, dh);
        }

        let currentLayout = null;

        // Render the whole composition to the canvas (any fill state: none, some, or all).
        // Empty cells get a neutral backdrop; the overlay shows their upload hint on top.
        function renderCanvas() {
            const total = getTotalSlots();
            const L = computeLayout();
            currentLayout = L;

            const ctx = previewCanvas.getContext('2d');
            previewCanvas.width = Math.max(1, Math.round(L.canvasW));
            previewCanvas.height = Math.max(1, Math.round(L.canvasH));

            ctx.fillStyle = hasBorder ? borderColor : '#0e0e11';
            ctx.fillRect(0, 0, previewCanvas.width, previewCanvas.height);

            if (L.diagonal) {
                const { x: ix, y: iy, w: iw, h: ih } = L.cells[0];
                const tris = diagonalDirection === 'tlbr'
                    ? [ [[ix,iy],[ix+iw,iy+ih],[ix,iy+ih]], [[ix,iy],[ix+iw,iy],[ix+iw,iy+ih]] ]
                    : [ [[ix,iy],[ix+iw,iy],[ix,iy+ih]], [[ix+iw,iy],[ix+iw,iy+ih],[ix,iy+ih]] ];
                for (let i = 0; i < 2; i++) {
                    ctx.save();
                    ctx.beginPath();
                    ctx.moveTo(tris[i][0][0], tris[i][0][1]);
                    ctx.lineTo(tris[i][1][0], tris[i][1][1]);
                    ctx.lineTo(tris[i][2][0], tris[i][2][1]);
                    ctx.closePath();
                    ctx.clip();
                    ctx.fillStyle = '#1a1a1e';
                    ctx.fillRect(ix, iy, iw, ih);
                    if (images[i]) drawCellImage(ctx, images[i], L.cells[i], imageTransforms[i]);
                    ctx.restore();
                }
                ctx.strokeStyle = hasBorder ? borderColor : 'rgba(255,255,255,0.85)';
                ctx.lineWidth = L.border > 0 ? L.border : Math.max(2, L.canvasW * 0.004);
                ctx.beginPath();
                if (diagonalDirection === 'tlbr') { ctx.moveTo(ix, iy); ctx.lineTo(ix + iw, iy + ih); }
                else { ctx.moveTo(ix + iw, iy); ctx.lineTo(ix, iy + ih); }
                ctx.stroke();
            } else {
                for (let i = 0; i < total; i++) {
                    const rect = L.cells[i];
                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(rect.x, rect.y, rect.w, rect.h);
                    ctx.clip();
                    if (images[i]) {
                        drawCellImage(ctx, images[i], rect, imageTransforms[i]);
                    } else {
                        ctx.fillStyle = '#1a1a1e';
                        ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
                    }
                    ctx.restore();
                }
            }

            syncOverlay();
        }

        function setLayout(newCols, newRows) {
            let c = Math.max(1, Math.min(MAX_DIM, Math.floor(newCols) || 1));
            let r = Math.max(1, Math.min(MAX_DIM, Math.floor(newRows) || 1));
            let t = c * r;
            if (t > MAX_TOTAL) {
                while (t > MAX_TOTAL && r > 1) { r--; t = c * r; }
                while (t > MAX_TOTAL && c > 1) { c--; t = c * r; }
            }
            cols = c;
            rows = r;

            const newTotal = c * r;
            // Adjust images and transforms array length
            if (newTotal > images.length) {
                while (images.length < newTotal) images.push(null);
                while (imageTransforms.length < newTotal) imageTransforms.push(null);
            } else {
                images = images.slice(0, newTotal);
                imageTransforms = imageTransforms.slice(0, newTotal);
            }

            // Sync UI controls
            const presetVal = `${c},${r}`;
            if (gridSelect) {
                const hasOpt = Array.from(gridSelect.options).some(o => o.value === presetVal);
                gridSelect.value = hasOpt ? presetVal : '';
            }
            if (customCols) customCols.value = c;
            if (customRows) customRows.value = r;
            if (aspectSelect) aspectSelect.value = aspectRatio;

            // Cell geometry changed → reset pan/zoom so photos re-fit cleanly (no jump)
            resetTransforms();

            updateDiagonalVisibility();
            buildOverlay();
            updateUI();
        }

        // Reset every loaded photo's pan/zoom to the default cover-fit
        function resetTransforms() {
            imageTransforms = images.map(im => im ? { scale: 1, panX: 0, panY: 0 } : null);
        }

        function updateDiagonalVisibility() {
            const total = getTotalSlots();
            const isTwo = total === 2;
            if (diagonalGroup) {
                diagonalGroup.style.display = isTwo ? 'block' : 'none';
            }
            if (!isTwo) {
                useDiagonal = false;
                if (diagonalToggle) diagonalToggle.checked = false;
                if (diagonalDirSection) diagonalDirSection.style.display = 'none';
            } else {
                // keep previous direction choice when returning to 2-photo grid
                syncDiagonalDirectionUI();
                if (diagonalDirSection) {
                    diagonalDirSection.style.display = (diagonalToggle && diagonalToggle.checked) ? 'block' : 'none';
                }
            }
        }

        function syncDiagonalDirectionUI() {
            if (!diagonalDirToggle) return;
            diagonalDirToggle.querySelectorAll('.direction-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.diag === diagonalDirection);
            });
        }

        // Grid layout controls
        if (gridSelect) {
            gridSelect.addEventListener('change', () => {
                const val = gridSelect.value;
                const [c, r] = val.split(',').map(Number);
                setLayout(c, r);
            });
        }

        function applyCustomFromInputs() {
            const c = parseInt(customCols.value);
            const r = parseInt(customRows.value);
            if (!isNaN(c) && !isNaN(r)) {
                setLayout(c, r);
            }
        }

        if (customCols) customCols.addEventListener('input', applyCustomFromInputs);
        if (customRows) customRows.addEventListener('input', applyCustomFromInputs);

        if (aspectSelect) {
            aspectSelect.addEventListener('change', () => {
                aspectRatio = aspectSelect.value;
                resetTransforms();
                updateUI();
            });
        }

        if (diagonalToggle) {
            diagonalToggle.addEventListener('change', () => {
                useDiagonal = diagonalToggle.checked;
                if (diagonalDirSection) {
                    diagonalDirSection.style.display = useDiagonal ? 'block' : 'none';
                }
                updateUI();
            });
        }

        // Diagonal direction buttons
        if (diagonalDirToggle) {
            diagonalDirToggle.querySelectorAll('.direction-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    diagonalDirToggle.querySelectorAll('.direction-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    diagonalDirection = btn.dataset.diag;
                    updateUI();
                });
            });
        }

        // Border toggle
        borderToggle.addEventListener('change', () => {
            hasBorder = borderToggle.checked;
            borderOptions.classList.toggle('visible', hasBorder);
            updateUI();
        });

        const borderWidthValue = document.getElementById('borderWidthValue');

        function updateSliderProgress() {
            const min = borderWidthInput.min || 1;
            const max = borderWidthInput.max || 100;
            const val = borderWidthInput.value;
            const progress = ((val - min) / (max - min)) * 100;
            borderWidthInput.style.setProperty('--progress', progress + '%');
        }
        updateSliderProgress();

        borderWidthInput.addEventListener('input', () => {
            borderWidth = parseInt(borderWidthInput.value) || 0;
            borderWidthValue.textContent = borderWidth + 'px';
            updateSliderProgress();
            updateUI();
        });

        borderColorInput.addEventListener('input', () => {
            borderColor = borderColorInput.value;
            colorHex.textContent = borderColor;
            updateUI();
        });

        function getTargetCanvasSize(loaded, cols, rows, border, aspectStr) {
            // aspectStr means the aspect ratio of the final combined photo (the whole result)
            const aspect = (aspectStr && aspectStr !== 'auto') ? aspectStr : null;

            let ref = 600;
            for (const im of loaded) {
                ref = Math.max(ref, Math.max(im.width || 0, im.height || 0));
            }
            ref = Math.max(ref, 400);

            if (!aspect) {
                // auto: cell size based on max dims across images (as before)
                let cellW = 0, cellH = 0;
                for (const im of loaded) {
                    cellW = Math.max(cellW, im.width || 0);
                    cellH = Math.max(cellH, im.height || 0);
                }
                if (cellW === 0) cellW = 600;
                if (cellH === 0) cellH = 400;
                const innerW = cols * cellW;
                const innerH = rows * cellH;
                return { width: innerW, height: innerH };
            }

            // fixed overall aspect: the whole inner area (before borders) matches cw:ch
            const [cw, ch] = aspect.split(':').map(n => parseFloat(n) || 1);
            const overallAspect = cw / ch;

            // base resolution on ref scaled by column count for reasonable cell size
            const innerW = ref * cols;
            const innerH = innerW / overallAspect;
            return { width: innerW, height: innerH };
        }


        // Download
        function downloadResult() {
            if (downloadBtn.disabled) return;
            const link = document.createElement('a');
            link.download = 'combined-photo.png';
            link.href = previewCanvas.toDataURL('image/png');
            link.click();
        }

        downloadBtn.addEventListener('click', downloadResult);

        // Copy to clipboard
        let copyFeedbackTimeout = null;

        async function copyResult() {
            if (copyBtn.disabled) return;

            try {
                const blob = await new Promise((resolve, reject) => {
                    previewCanvas.toBlob((result) => {
                        if (result) resolve(result);
                        else reject(new Error('Failed to create image blob'));
                    }, 'image/png');
                });

                await navigator.clipboard.write([
                    new ClipboardItem({ 'image/png': blob })
                ]);

                copyBtnLabel.textContent = 'Copied!';
                clearTimeout(copyFeedbackTimeout);
                copyFeedbackTimeout = setTimeout(() => {
                    copyBtnLabel.textContent = 'Copy to Clipboard';
                }, 2000);
            } catch (err) {
                console.error('Failed to copy image:', err);
                copyBtnLabel.textContent = 'Copy failed';
                clearTimeout(copyFeedbackTimeout);
                copyFeedbackTimeout = setTimeout(() => {
                    copyBtnLabel.textContent = 'Copy to Clipboard';
                }, 2000);
            }
        }

        copyBtn.addEventListener('click', copyResult);

        // Paste image from clipboard into the next empty slot (cycles if full)
        document.addEventListener('paste', (e) => {
            const items = e.clipboardData?.items;
            if (!items) return;

            for (const item of items) {
                if (item.type.startsWith('image/')) {
                    const blob = item.getAsFile();
                    if (!blob) return;

                    e.preventDefault();
                    handleClipboardImage(blob);
                    return;
                }
            }
        });

        // Keyboard shortcut: Cmd+D (Mac) / Ctrl+D (Win/Linux)
        document.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'd') {
                e.preventDefault();
                downloadResult();
            }
        });

        // Keep the overlay aligned to the canvas as it scales with the viewport
        window.addEventListener('resize', syncOverlay);

        // Initialize overlay and grid UI
        function initGridUI() {
            if (gridSelect) gridSelect.value = `${cols},${rows}`;
            if (customCols) customCols.value = cols;
            if (customRows) customRows.value = rows;
            if (aspectSelect) aspectSelect.value = aspectRatio;
            syncDiagonalDirectionUI();
            updateDiagonalVisibility();
            buildOverlay();
            updateUI();
        }

        initGridUI();

        // Detect OS for shortcut hint
        const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
        const shortcutHint = document.getElementById('shortcutHint');
        shortcutHint.textContent = isMac ? '⌘D' : 'Ctrl+D';
    </script>
</body>
</html>
