<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Side by Side - Photo Combiner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f0f11;
            --surface: #18181b;
            --surface-2: #27272a;
            --border: #3f3f46;
            --text: #fafafa;
            --text-muted: #a1a1aa;
            --success: #22c55e;
            --radius: 12px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Upload Area */
        .upload-section {
            display: grid;
            gap: 6px;
            margin-bottom: 1.5rem;
            width: 100%;
        }

        .upload-section.dense .upload-box {
            padding: 0.5rem;
            min-height: 110px;
        }

        .upload-section.dense .upload-icon {
            width: 24px;
            height: 24px;
            margin-bottom: 0.25rem;
        }

        .upload-section.dense .label,
        .upload-section.dense p {
            font-size: 0.7rem;
        }

        .upload-box {
            background: var(--surface);
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            min-height: 150px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .upload-box:hover {
            border-color: var(--primary);
            background: var(--surface-2);
        }

        .upload-box.has-image {
            border-style: solid;
            border-color: var(--success);
            padding: 0.5rem;
        }

        .upload-box input {
            display: none;
        }

        .upload-box .upload-icon {
            width: 36px;
            height: 36px;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .upload-box p {
            color: var(--text-muted);
            font-size: 0.8rem;
            line-height: 1.15;
        }

        .upload-box .label {
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.15rem;
            font-size: 0.85rem;
        }

        .upload-box .preview-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 6px;
        }

        .image-preview-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            border-radius: 6px;
            background: #111;
            cursor: grab;
        }

        .image-preview-container:active {
            cursor: grabbing;
        }

        .image-preview-container .preview-img {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            max-width: none;
            max-height: none;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }

        .upload-content {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .upload-box.has-image .upload-content {
            display: none;
        }

        .remove-image-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2;
            transition: background 0.2s ease, transform 0.15s ease;
        }

        .remove-image-btn svg {
            width: 14px;
            height: 14px;
        }

        .upload-box.has-image .remove-image-btn {
            display: flex;
        }

        .remove-image-btn:hover {
            background: rgba(239, 68, 68, 0.9);
            transform: scale(1.1);
        }

        /* Preview Area */
        .preview-area {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 1.5rem;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-placeholder {
            text-align: center;
            color: var(--text-muted);
        }

        .preview-placeholder svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        #previewCanvas {
            max-width: 100%;
            max-height: 500px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        /* Controls Panel */
        .controls-panel {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 1.5rem;
            height: fit-content;
        }

        .controls-panel h2 {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .controls-panel h2 svg {
            width: 20px;
            height: 20px;
        }

        .control-group {
            margin-bottom: 1.5rem;
        }

        .control-group > label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        /* Direction Toggle */
        .direction-toggle {
            display: flex;
            background: var(--surface-2);
            border-radius: 8px;
            padding: 4px;
        }

        .direction-btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .direction-btn svg {
            width: 18px;
            height: 18px;
        }

        .direction-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Grid layout */
        select {
            width: 100%;
            padding: 0.6rem 0.75rem;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.9rem;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .custom-grid {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .custom-grid input[type="number"] {
            width: 52px;
            padding: 0.35rem 0.4rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 0.85rem;
            text-align: center;
        }

        .custom-grid span {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* Checkbox - label.checkbox-wrapper so it overrides .control-group > label { display: block } */
        label.checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
        }

        .checkbox-wrapper input {
            display: none;
        }

        .checkbox-custom {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .checkbox-wrapper input:checked + .checkbox-custom {
            background: var(--primary);
            border-color: var(--primary);
        }

        .checkbox-custom svg {
            width: 14px;
            height: 14px;
            color: white;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .checkbox-wrapper input:checked + .checkbox-custom svg {
            opacity: 1;
        }

        .checkbox-label {
            font-size: 0.95rem;
        }

        /* Border Options */
        .border-options {
            margin-top: 1rem;
            padding: 1rem;
            background: var(--surface-2);
            border-radius: 8px;
            display: none;
        }

        .border-options.visible {
            display: block;
        }

        .border-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .border-row:last-child {
            margin-bottom: 0;
        }

        .border-field {
            flex: 1;
        }

        .border-field label {
            font-size: 0.8rem;
            margin-bottom: 0.25rem;
            display: block;
            color: var(--text-muted);
        }

        /* Slider */
        .slider-wrapper {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: linear-gradient(to right, var(--primary) 0%, var(--primary) var(--progress, 10%), var(--bg) var(--progress, 10%), var(--bg) 100%);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            height: 4px;
            border-radius: 2px;
        }

        input[type="range"]::-moz-range-track {
            height: 4px;
            background: var(--bg);
            border-radius: 2px;
        }

        input[type="range"]::-moz-range-progress {
            background: var(--primary);
            height: 4px;
            border-radius: 2px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            margin-top: -6px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
        }

        .slider-value {
            min-width: 42px;
            padding: 0.25rem 0.5rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text);
            font-family: monospace;
            background: var(--bg);
            border-radius: 4px;
        }

        .color-input-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
        }

        input[type="color"] {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: none;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 4px;
        }

        .color-hex {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-family: monospace;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn svg {
            width: 20px;
            height: 20px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-success {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
            margin-top: 1rem;
        }

        .btn-success:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(34, 197, 94, 0.4);
        }

        .btn-success:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border);
            margin-top: 0.75rem;
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--border);
            transform: translateY(-2px);
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .shortcut-hint {
            margin-left: 0.5rem;
            padding: 0.2rem 0.4rem;
            font-size: 0.7rem;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            opacity: 0.8;
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .preview-area canvas {
            animation: fadeIn 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Side by Side</h1>
            <p class="subtitle">Combine photos in flexible grids (2×1, 2×2, 3×3...). 100% offline, runs entirely in your browser.</p>
        </header>

        <div class="main-grid">
            <div class="workspace">
                <div class="upload-section"></div>

                <div class="preview-area" id="previewArea">
                    <div class="preview-placeholder" id="placeholder">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2" />
                        </svg>
                        <p id="placeholderText">Upload photos to see preview</p>
                    </div>
                    <canvas id="previewCanvas" style="display: none;"></canvas>
                </div>
            </div>

            <div class="controls-panel">
                <h2>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
                    </svg>
                    Options
                </h2>

                <div class="control-group">
                    <label>Grid layout</label>
                    <select id="gridSelect">
                        <option value="2,1">2 × 1</option>
                        <option value="1,2">1 × 2</option>
                        <option value="2,2">2 × 2</option>
                        <option value="3,2">3 × 2</option>
                        <option value="2,3">2 × 3</option>
                        <option value="3,3">3 × 3</option>
                    </select>
                    <div class="custom-grid">
                        <input type="number" id="customCols" value="2" min="1" max="6">
                        <span>×</span>
                        <input type="number" id="customRows" value="1" min="1" max="6">
                    </div>
                </div>

                <div class="control-group">
                    <label>Aspect ratio</label>
                    <select id="aspectSelect">
                        <option value="auto">Auto (from images)</option>
                        <option value="1:1">1:1 (Square)</option>
                        <option value="4:3">4:3</option>
                        <option value="3:2">3:2</option>
                        <option value="5:4">5:4</option>
                        <option value="16:9">16:9</option>
                        <option value="21:9">21:9 (Ultrawide)</option>
                        <option value="2:1">2:1</option>
                        <option value="3:4">3:4 (Portrait)</option>
                        <option value="2:3">2:3</option>
                        <option value="9:16">9:16</option>
                        <option value="4:5">4:5</option>
                        <option value="5:7">5:7</option>
                        <option value="1:2">1:2</option>
                    </select>
                </div>

                <div class="control-group" id="diagonalGroup" style="display:none;">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="diagonalToggle">
                        <span class="checkbox-custom">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                            </svg>
                        </span>
                        <span class="checkbox-label">Diagonal split</span>
                    </label>

                    <div id="diagonalDirSection" style="margin-top: 0.5rem; display: none;">
                        <label style="font-size: 0.72rem; color: var(--text-muted); display: block; margin-bottom: 0.3rem;">Direction</label>
                        <div class="direction-toggle" id="diagonalDirToggle">
                            <button class="direction-btn active" data-diag="tlbr" title="Top-left to bottom-right">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="2" width="20" height="20" rx="3" />
                                    <line x1="5" y1="5" x2="19" y2="19" />
                                </svg>
                            </button>
                            <button class="direction-btn" data-diag="trbl" title="Top-right to bottom-left">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="2" width="20" height="20" rx="3" />
                                    <line x1="19" y1="5" x2="5" y2="19" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="control-group">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="borderToggle">
                        <span class="checkbox-custom">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                            </svg>
                        </span>
                        <span class="checkbox-label">Add Border</span>
                    </label>

                    <div class="border-options" id="borderOptions">
                        <div class="border-row">
                            <div class="border-field">
                                <label>Width (px)</label>
                                <div class="slider-wrapper">
                                    <input type="range" id="borderWidth" value="0" min="0" max="100">
                                    <span class="slider-value" id="borderWidthValue">0px</span>
                                </div>
                            </div>
                        </div>
                        <div class="border-row">
                            <div class="border-field">
                                <label>Color</label>
                                <div class="color-input-wrapper">
                                    <input type="color" id="borderColor" value="#ffffff">
                                    <span class="color-hex" id="colorHex">#ffffff</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <button class="btn btn-success" id="downloadBtn" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    Download Result
                    <kbd class="shortcut-hint" id="shortcutHint">⌘D</kbd>
                </button>

                <button class="btn btn-secondary" id="copyBtn" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                    </svg>
                    <span id="copyBtnLabel">Copy to Clipboard</span>
                </button>
            </div>
        </div>

        <footer>
            <p>100% offline. No uploads, no tracking. Your photos never leave your device.</p>
        </footer>
    </div>

    <script>
        // State
        let images = [null, null];
        let imageTransforms = [];
        let cols = 2;
        let rows = 1;
        let lastPastedSlot = null;
        let useDiagonal = false;
        let diagonalDirection = 'tlbr'; // 'tlbr' = top-left to bottom-right (\), 'trbl' = top-right to bottom-left (/)
        let aspectRatio = 'auto';
        let hasBorder = false;
        let borderWidth = 0;
        let borderColor = '#ffffff';
        const MAX_DIM = 6;
        const MAX_TOTAL = 12;

        // DOM Elements
        const uploadSection = document.querySelector('.upload-section');
        const previewArea = document.getElementById('previewArea');
        const placeholder = document.getElementById('placeholder');
        const previewCanvas = document.getElementById('previewCanvas');
        const downloadBtn = document.getElementById('downloadBtn');
        const copyBtn = document.getElementById('copyBtn');
        const copyBtnLabel = document.getElementById('copyBtnLabel');
        const borderToggle = document.getElementById('borderToggle');
        const borderOptions = document.getElementById('borderOptions');
        const borderWidthInput = document.getElementById('borderWidth');
        const borderColorInput = document.getElementById('borderColor');
        const colorHex = document.getElementById('colorHex');
        const gridSelect = document.getElementById('gridSelect');
        const customCols = document.getElementById('customCols');
        const customRows = document.getElementById('customRows');
        const aspectSelect = document.getElementById('aspectSelect');
        const diagonalGroup = document.getElementById('diagonalGroup');
        const diagonalToggle = document.getElementById('diagonalToggle');
        const diagonalDirToggle = document.getElementById('diagonalDirToggle');
        const diagonalDirSection = document.getElementById('diagonalDirSection');

        function getTotalSlots() {
            return cols * rows;
        }

        function renderUploads() {
            if (!uploadSection) return;

            const total = getTotalSlots();

            // The upload grid mirrors the result's cols×rows structure, but stays compact:
            // full-width columns with a fixed-height per cell. The chosen aspect ratio is
            // applied only to the result canvas (getTargetCanvasSize), not here — CSS
            // aspect-ratio on a grid container was unreliable across browsers.
            uploadSection.style.setProperty('--cols', cols);
            uploadSection.style.setProperty('--rows', rows);
            uploadSection.style.gridTemplateColumns = `repeat(${cols}, minmax(0, 1fr))`;
            uploadSection.style.gridTemplateRows = `repeat(${rows}, auto)`;
            uploadSection.style.aspectRatio = '';
            uploadSection.style.maxHeight = '';

            // Compact inner elements when many slots
            if (total > 4) {
                uploadSection.classList.add('dense');
            } else {
                uploadSection.classList.remove('dense');
            }

            uploadSection.innerHTML = '';

            for (let i = 0; i < total; i++) {
                const box = document.createElement('div');
                box.className = 'upload-box';
                const hasImg = !!images[i];
                if (hasImg) box.classList.add('has-image');

                box.innerHTML = `
                    <input type="file" accept="image/*">
                    <div class="upload-content">
                        <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <p class="label">Photo ${i + 1}</p>
                        <p>Click, drag, or paste to upload</p>
                    </div>
                    <img class="preview-img" style="display:${hasImg ? 'block' : 'none'};" alt="Preview ${i + 1}">
                    <button class="remove-image-btn" type="button" data-index="${i}" aria-label="Remove photo ${i + 1}" title="Remove photo">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                `;

                const fileInput = box.querySelector('input[type="file"]');
                const previewImg = box.querySelector('.preview-img');
                const removeBtn = box.querySelector('.remove-image-btn');

                // Click to upload (ignore remove clicks)
                box.addEventListener('click', (e) => {
                    if (e.target.closest('.remove-image-btn')) return;
                    fileInput.click();
                });

                // Drag & drop
                box.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    box.style.borderColor = 'var(--primary)';
                });
                box.addEventListener('dragleave', () => {
                    box.style.borderColor = '';
                });
                box.addEventListener('drop', (e) => {
                    e.preventDefault();
                    box.style.borderColor = '';
                    const file = e.dataTransfer.files[0];
                    if (file && file.type.startsWith('image/')) {
                        handleFileForSlot(file, box, previewImg, i);
                    }
                });

                fileInput.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        handleFileForSlot(file, box, previewImg, i);
                    }
                });

                removeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    removeImage(i);
                });

                // Restore preview if image exists
                if (hasImg && images[i]) {
                    previewImg.src = images[i].src || '';
                }

                uploadSection.appendChild(box);

                if (hasImg) {
                    setupImageInteractivity(box, i);
                }
            }
        }

        function updatePreviewTransform(container, imgEl, transform) {
            if (!container || !imgEl || !transform) return;
            const cw = container.clientWidth || 120;
            const ch = container.clientHeight || 120;
            const iw = imgEl.naturalWidth || imgEl.width || 100;
            const ih = imgEl.naturalHeight || imgEl.height || 100;
            const baseScale = Math.min(cw / iw, ch / ih) || 1;
            const displayW = iw * baseScale;
            const displayH = ih * baseScale;
            imgEl.style.width = displayW + 'px';
            imgEl.style.height = displayH + 'px';
            imgEl.style.transform = `translate(-50%, -50%) translate(${transform.panX}px, ${transform.panY}px) scale(${transform.scale})`;
        }

        function setupImageInteractivity(box, index) {
            if (!box || !images[index]) return;
            let container = box.querySelector('.image-preview-container');
            let previewImg = box.querySelector('.preview-img');
            if (!previewImg) return;

            if (!container) {
                container = document.createElement('div');
                container.className = 'image-preview-container';
                previewImg.style.display = 'block';
                previewImg.style.left = '50%';
                previewImg.style.top = '50%';
                container.appendChild(previewImg);
                const removeBtn = box.querySelector('.remove-image-btn');
                if (removeBtn) {
                    box.insertBefore(container, removeBtn);
                } else {
                    box.appendChild(container);
                }
            }

            const t = imageTransforms[index] || { scale: 1, panX: 0, panY: 0 };
            imageTransforms[index] = t;

            setTimeout(() => updatePreviewTransform(container, previewImg, t), 0);

            // Wheel for zoom (around cursor)
            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                const rect = container.getBoundingClientRect();
                const mx = (e.clientX - rect.left) - container.clientWidth / 2;
                const my = (e.clientY - rect.top) - container.clientHeight / 2;
                const factor = e.deltaY < 0 ? 1.12 : 0.89;
                const oldScale = t.scale;
                let newScale = oldScale * factor;
                newScale = Math.max(0.15, Math.min(10, newScale));
                const scaleRatio = newScale / oldScale;
                t.panX = mx - (mx - t.panX) * scaleRatio;
                t.panY = my - (my - t.panY) * scaleRatio;
                t.scale = newScale;
                updatePreviewTransform(container, previewImg, t);
                updateUI();
            }, { passive: false });

            // Drag to pan
            let dragging = false;
            let startX = 0, startY = 0, startPanX = 0, startPanY = 0;

            const moveHandler = (e) => {
                if (!dragging) return;
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                t.panX = startPanX + dx;
                t.panY = startPanY + dy;
                updatePreviewTransform(container, previewImg, t);
            };

            const upHandler = () => {
                dragging = false;
                document.removeEventListener('mousemove', moveHandler);
                document.removeEventListener('mouseup', upHandler);
                updateUI();
            };

            container.addEventListener('mousedown', (e) => {
                if (e.button !== 0) return;
                dragging = true;
                startX = e.clientX;
                startY = e.clientY;
                startPanX = t.panX;
                startPanY = t.panY;
                document.addEventListener('mousemove', moveHandler);
                document.addEventListener('mouseup', upHandler);
            });

            // Reset on double click
            container.addEventListener('dblclick', (e) => {
                e.stopPropagation();
                t.scale = 1;
                t.panX = 0;
                t.panY = 0;
                updatePreviewTransform(container, previewImg, t);
                updateUI();
            });
        }

        function loadImageToSlot(index, dataUrl) {
            const img = new Image();
            img.onload = () => {
                images[index] = img;
                imageTransforms[index] = { scale: 1, panX: 0, panY: 0 };
                // Update the specific upload box in place if present
                const boxes = uploadSection.querySelectorAll('.upload-box');
                const box = boxes[index];
                if (box) {
                    const previewImg = box.querySelector('.preview-img');
                    if (previewImg) {
                        previewImg.src = dataUrl;
                        previewImg.style.display = 'block';
                    }
                    box.classList.add('has-image');
                }
                setupImageInteractivity(box, index);
                updateUI();
            };
            img.src = dataUrl;
        }

        function handleFileForSlot(file, uploadBox, previewImg, index) {
            const reader = new FileReader();
            reader.onload = (e) => {
                loadImageToSlot(index, e.target.result);
            };
            reader.readAsDataURL(file);
        }

        function removeImage(index) {
            images[index] = null;
            imageTransforms[index] = null;

            // Update DOM for this slot
            const boxes = uploadSection.querySelectorAll('.upload-box');
            const box = boxes[index];
            if (box) {
                const previewImg = box.querySelector('.preview-img');
                const fileInput = box.querySelector('input[type="file"]');
                const container = box.querySelector('.image-preview-container');
                if (container) container.remove();
                if (previewImg) {
                    previewImg.src = '';
                    previewImg.style.display = 'none';
                }
                box.classList.remove('has-image');
                if (fileInput) fileInput.value = '';
            }

            updateUI();
        }

        function getPasteTargetSlot() {
            const total = getTotalSlots();
            // Find first empty
            for (let i = 0; i < total; i++) {
                if (!images[i]) return i;
            }
            // All full: cycle from last
            if (lastPastedSlot == null) return 0;
            return (lastPastedSlot + 1) % total;
        }

        function handleClipboardImage(blob) {
            const slot = getPasteTargetSlot();
            const total = getTotalSlots();
            if (slot >= total) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                loadImageToSlot(slot, e.target.result);
                lastPastedSlot = slot;
            };
            reader.readAsDataURL(blob);
        }

        function updateUI() {
            const total = getTotalSlots();
            const hasAll = images.length >= total && images.slice(0, total).every(img => !!img);
            if (hasAll) {
                combinePhotos();
            } else {
                drawLayoutPreview();
                downloadBtn.disabled = true;
                copyBtn.disabled = true;
            }
        }

        function drawLayoutPreview() {
            const total = getTotalSlots();
            if (total === 0) return;

            const ctx = previewCanvas.getContext('2d');
            const border = hasBorder ? borderWidth : 0;

            // Use loaded images for ref size if any, else default
            let refImgs = images.slice(0, total).filter(Boolean);
            if (refImgs.length === 0) {
                refImgs = [{width: 600, height: 400}];
            }

            const targetSize = getTargetCanvasSize(refImgs, cols, rows, border, aspectRatio);

            let targetW, targetH;
            if (targetSize) {
                targetW = targetSize.width;
                targetH = targetSize.height;
            } else {
                let cellW = 0, cellH = 0;
                refImgs.forEach(im => {
                    cellW = Math.max(cellW, im.width || 600);
                    cellH = Math.max(cellH, im.height || 400);
                });
                if (cellW === 0) { cellW = 600; cellH = 400; }
                targetW = cols * cellW;
                targetH = rows * cellH;
            }

            const totalW = targetW + (cols + 1) * border;
            const totalH = targetH + (rows + 1) * border;

            previewCanvas.width = totalW;
            previewCanvas.height = totalH;

            // Light background for preview
            ctx.fillStyle = '#1a1a1e';
            ctx.fillRect(0, 0, totalW, totalH);

            // Draw cell outlines (faint grid)
            ctx.strokeStyle = 'rgba(255,255,255,0.25)';
            ctx.lineWidth = 1;

            const cellW = targetW / cols;
            const cellH = targetH / rows;

            for (let i = 0; i < total; i++) {
                const r = Math.floor(i / cols);
                const c = i % cols;
                const cx = border + c * (cellW + border);
                const cy = border + r * (cellH + border);
                ctx.strokeRect(cx + 0.5, cy + 0.5, cellW, cellH);
            }

            // Outer border hint if any
            if (border > 0) {
                ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                ctx.lineWidth = border;
                ctx.strokeRect(border/2, border/2, totalW - border, totalH - border);
            }

            // If diagonal mode for 2 photos, draw a representative combined rect + diagonal (using cell size)
            if (total === 2 && useDiagonal) {
                const cW = targetW;
                const cH = targetH;
                const ix = border;
                const iy = border;
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = Math.max(1, border || 1);
                // faint rect for the combined area
                ctx.strokeRect(ix, iy, cW, cH);
                // the diagonal line
                ctx.strokeStyle = 'rgba(255,255,255,0.7)';
                ctx.beginPath();
                if (diagonalDirection === 'tlbr') {
                    ctx.moveTo(ix, iy);
                    ctx.lineTo(ix + cW, iy + cH);
                } else {
                    ctx.moveTo(ix + cW, iy);
                    ctx.lineTo(ix, iy + cH);
                }
                ctx.stroke();
            }

            placeholder.style.display = 'none';
            previewCanvas.style.display = 'block';
        }

        function setLayout(newCols, newRows) {
            let c = Math.max(1, Math.min(MAX_DIM, Math.floor(newCols) || 1));
            let r = Math.max(1, Math.min(MAX_DIM, Math.floor(newRows) || 1));
            let t = c * r;
            if (t > MAX_TOTAL) {
                while (t > MAX_TOTAL && r > 1) { r--; t = c * r; }
                while (t > MAX_TOTAL && c > 1) { c--; t = c * r; }
            }
            cols = c;
            rows = r;

            const newTotal = c * r;
            // Adjust images and transforms array length
            if (newTotal > images.length) {
                while (images.length < newTotal) images.push(null);
                while (imageTransforms.length < newTotal) imageTransforms.push(null);
            } else {
                images = images.slice(0, newTotal);
                imageTransforms = imageTransforms.slice(0, newTotal);
            }

            // Sync UI controls
            const presetVal = `${c},${r}`;
            if (gridSelect) {
                const hasOpt = Array.from(gridSelect.options).some(o => o.value === presetVal);
                gridSelect.value = hasOpt ? presetVal : '';
            }
            if (customCols) customCols.value = c;
            if (customRows) customRows.value = r;
            if (aspectSelect) aspectSelect.value = aspectRatio;

            updateDiagonalVisibility();
            renderUploads();
            updatePlaceholderText();
            updateUI();
        }

        function updateDiagonalVisibility() {
            const total = getTotalSlots();
            const isTwo = total === 2;
            if (diagonalGroup) {
                diagonalGroup.style.display = isTwo ? 'block' : 'none';
            }
            if (!isTwo) {
                useDiagonal = false;
                if (diagonalToggle) diagonalToggle.checked = false;
                if (diagonalDirSection) diagonalDirSection.style.display = 'none';
            } else {
                // keep previous direction choice when returning to 2-photo grid
                syncDiagonalDirectionUI();
                if (diagonalDirSection) {
                    diagonalDirSection.style.display = (diagonalToggle && diagonalToggle.checked) ? 'block' : 'none';
                }
            }
        }

        function syncDiagonalDirectionUI() {
            if (!diagonalDirToggle) return;
            diagonalDirToggle.querySelectorAll('.direction-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.diag === diagonalDirection);
            });
        }

        function updatePlaceholderText() {
            const textEl = document.getElementById('placeholderText');
            if (!textEl) return;
            const total = getTotalSlots();
            if (total === 1) {
                textEl.textContent = 'Upload a photo to see preview';
            } else {
                textEl.textContent = `Upload ${total} photos to see preview`;
            }
        }

        // Grid layout controls
        if (gridSelect) {
            gridSelect.addEventListener('change', () => {
                const val = gridSelect.value;
                const [c, r] = val.split(',').map(Number);
                setLayout(c, r);
            });
        }

        function applyCustomFromInputs() {
            const c = parseInt(customCols.value);
            const r = parseInt(customRows.value);
            if (!isNaN(c) && !isNaN(r)) {
                setLayout(c, r);
            }
        }

        if (customCols) customCols.addEventListener('input', applyCustomFromInputs);
        if (customRows) customRows.addEventListener('input', applyCustomFromInputs);

        if (aspectSelect) {
            aspectSelect.addEventListener('change', () => {
                aspectRatio = aspectSelect.value;
                renderUploads();
                updateUI();
            });
        }

        if (diagonalToggle) {
            diagonalToggle.addEventListener('change', () => {
                useDiagonal = diagonalToggle.checked;
                if (diagonalDirSection) {
                    diagonalDirSection.style.display = useDiagonal ? 'block' : 'none';
                }
                updateUI();
            });
        }

        // Diagonal direction buttons
        if (diagonalDirToggle) {
            diagonalDirToggle.querySelectorAll('.direction-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    diagonalDirToggle.querySelectorAll('.direction-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    diagonalDirection = btn.dataset.diag;
                    updateUI();
                });
            });
        }

        // Border toggle
        borderToggle.addEventListener('change', () => {
            hasBorder = borderToggle.checked;
            borderOptions.classList.toggle('visible', hasBorder);
            updateUI();
        });

        const borderWidthValue = document.getElementById('borderWidthValue');

        function updateSliderProgress() {
            const min = borderWidthInput.min || 1;
            const max = borderWidthInput.max || 100;
            const val = borderWidthInput.value;
            const progress = ((val - min) / (max - min)) * 100;
            borderWidthInput.style.setProperty('--progress', progress + '%');
        }
        updateSliderProgress();

        borderWidthInput.addEventListener('input', () => {
            borderWidth = parseInt(borderWidthInput.value) || 0;
            borderWidthValue.textContent = borderWidth + 'px';
            updateSliderProgress();
            updateUI();
        });

        borderColorInput.addEventListener('input', () => {
            borderColor = borderColorInput.value;
            colorHex.textContent = borderColor;
            updateUI();
        });

        function drawCover(ctx, img, x, y, w, h) {
            const scale = Math.max(w / img.width, h / img.height);
            const dw = img.width * scale;
            const dh = img.height * scale;
            ctx.drawImage(img, x + (w - dw) / 2, y + (h - dh) / 2, dw, dh);
        }

        // Combine photos
        function getTargetCanvasSize(loaded, cols, rows, border, aspectStr) {
            // aspectStr means the aspect ratio of the final combined photo (the whole result)
            const aspect = (aspectStr && aspectStr !== 'auto') ? aspectStr : null;

            let ref = 600;
            for (const im of loaded) {
                ref = Math.max(ref, Math.max(im.width || 0, im.height || 0));
            }
            ref = Math.max(ref, 400);

            if (!aspect) {
                // auto: cell size based on max dims across images (as before)
                let cellW = 0, cellH = 0;
                for (const im of loaded) {
                    cellW = Math.max(cellW, im.width || 0);
                    cellH = Math.max(cellH, im.height || 0);
                }
                if (cellW === 0) cellW = 600;
                if (cellH === 0) cellH = 400;
                const innerW = cols * cellW;
                const innerH = rows * cellH;
                return { width: innerW, height: innerH };
            }

            // fixed overall aspect: the whole inner area (before borders) matches cw:ch
            const [cw, ch] = aspect.split(':').map(n => parseFloat(n) || 1);
            const overallAspect = cw / ch;

            // base resolution on ref scaled by column count for reasonable cell size
            const innerW = ref * cols;
            const innerH = innerW / overallAspect;
            return { width: innerW, height: innerH };
        }

        function combinePhotos() {
            const total = getTotalSlots();
            const loaded = images.slice(0, total);
            if (loaded.length !== total || loaded.some(img => !img)) return;

            const ctx = previewCanvas.getContext('2d');
            const border = hasBorder ? borderWidth : 0;

            const isDiagonalCase = (total === 2 && useDiagonal);
            const targetSize = getTargetCanvasSize(loaded, cols, rows, border, aspectRatio);

            if (isDiagonalCase) {
                // Diagonal split for 2 photos (user can choose direction)
                const img0 = loaded[0];
                const img1 = loaded[1];
                let targetW, targetH;
                if (targetSize) {
                    // diagonal: the final photo is one rect split diagonally, matching the overall aspect
                    targetW = targetSize.width;
                    targetH = targetSize.height;
                } else {
                    targetW = Math.max(img0.width, img1.width);
                    targetH = Math.max(img0.height, img1.height);
                }

                previewCanvas.width = targetW + border * 2;
                previewCanvas.height = targetH + border * 2;

                if (hasBorder) {
                    ctx.fillStyle = borderColor;
                    ctx.fillRect(0, 0, previewCanvas.width, previewCanvas.height);
                }

                const ix = border;
                const iy = border;
                const iw = targetW;
                const ih = targetH;

                // Line style
                const lineW = border > 0 ? border : 4;
                ctx.strokeStyle = border > 0 ? borderColor : '#ffffff';
                ctx.lineWidth = lineW;

                const dir = diagonalDirection;
                const t0 = imageTransforms[0] || { scale: 1, panX: 0, panY: 0 };
                const t1 = imageTransforms[1] || { scale: 1, panX: 0, panY: 0 };

                // Helper to draw transformed image then clip
                function drawTransformedClipped(img, t, clipPoints, linePoints) {
                    const baseScale = Math.min(iw / img.width, ih / img.height) || 1;
                    const ds = baseScale * t.scale;
                    const dw = img.width * ds;
                    const dh = img.height * ds;
                    const dx = ix + (iw - dw) / 2 + t.panX;
                    const dy = iy + (ih - dh) / 2 + t.panY;

                    ctx.save();
                    ctx.beginPath();
                    ctx.moveTo(clipPoints[0][0], clipPoints[0][1]);
                    ctx.lineTo(clipPoints[1][0], clipPoints[1][1]);
                    ctx.lineTo(clipPoints[2][0], clipPoints[2][1]);
                    ctx.closePath();
                    ctx.clip();
                    ctx.drawImage(img, dx, dy, dw, dh);
                    ctx.restore();
                }

                if (dir === 'tlbr') {
                    // \ 
                    drawTransformedClipped(img0, t0, [[ix,iy], [ix+iw,iy+ih], [ix,iy+ih]]);
                    drawTransformedClipped(img1, t1, [[ix,iy], [ix+iw,iy], [ix+iw,iy+ih]]);
                    ctx.beginPath();
                    ctx.moveTo(ix, iy);
                    ctx.lineTo(ix + iw, iy + ih);
                    ctx.stroke();
                } else {
                    // / 
                    drawTransformedClipped(img0, t0, [[ix,iy], [ix+iw,iy], [ix,iy+ih]]);
                    drawTransformedClipped(img1, t1, [[ix+iw,iy], [ix+iw,iy+ih], [ix,iy+ih]]);
                    ctx.beginPath();
                    ctx.moveTo(ix + iw, iy);
                    ctx.lineTo(ix, iy + ih);
                    ctx.stroke();
                }
            } else if (total === 2) {
                // 2-photo non-diagonal: use cell layout + transforms (cell aspect when selected)
                const img0 = loaded[0];
                const img1 = loaded[1];
                const isHorizontal = cols === 2;

                let cellW, cellH, cTotalW, cTotalH;
                if (targetSize) {
                    const innerW = targetSize.width;
                    const innerH = targetSize.height;
                    cellW = innerW / cols;
                    cellH = innerH / rows;
                    cTotalW = innerW + (cols + 1) * border;
                    cTotalH = innerH + (rows + 1) * border;
                } else if (isHorizontal) {
                    const th = Math.max(img0.height, img1.height);
                    const w0 = img0.width * (th / img0.height);
                    const w1 = img1.width * (th / img1.height);
                    const innerW = w0 + w1;
                    const innerH = th;
                    cellW = innerW / 2;
                    cellH = innerH;
                    cTotalW = innerW + 3 * border;
                    cTotalH = innerH + 2 * border;
                } else {
                    const tw = Math.max(img0.width, img1.width);
                    const h0 = img0.height * (tw / img0.width);
                    const h1 = img1.height * (tw / img1.width);
                    const innerW = tw;
                    const innerH = h0 + h1;
                    cellW = innerW;
                    cellH = innerH / 2;
                    cTotalW = innerW + 2 * border;
                    cTotalH = innerH + 3 * border;
                }

                previewCanvas.width = cTotalW;
                previewCanvas.height = cTotalH;

                if (hasBorder) {
                    ctx.fillStyle = borderColor;
                    ctx.fillRect(0, 0, cTotalW, cTotalH);
                }

                for (let i = 0; i < 2; i++) {
                    const im = loaded[i];
                    const t = imageTransforms[i] || { scale: 1, panX: 0, panY: 0 };
                    const cx = border + (isHorizontal ? i * (cellW + border) : 0);
                    const cy = border + (isHorizontal ? 0 : i * (cellH + border));
                    const base = Math.min(cellW / im.width, cellH / im.height) || 1;
                    const ds = base * t.scale;
                    const dw = im.width * ds;
                    const dh = im.height * ds;
                    const dx = cx + (cellW - dw)/2 + t.panX;
                    const dy = cy + (cellH - dh)/2 + t.panY;

                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(cx, cy, cellW, cellH);
                    ctx.clip();
                    ctx.drawImage(im, dx, dy, dw, dh);
                    ctx.restore();
                }
            } else {
                // General grid with transforms + optional forced aspect
                let cellW, cellH, totalW, totalH;
                if (targetSize) {
                    const innerW = targetSize.width;
                    const innerH = targetSize.height;
                    cellW = innerW / cols;
                    cellH = innerH / rows;
                    totalW = innerW + (cols + 1) * border;
                    totalH = innerH + (rows + 1) * border;
                } else {
                    cellW = 0; cellH = 0;
                    for (const im of loaded) {
                        cellW = Math.max(cellW, im.width);
                        cellH = Math.max(cellH, im.height);
                    }
                    totalW = cols * cellW + (cols + 1) * border;
                    totalH = rows * cellH + (rows + 1) * border;
                }

                previewCanvas.width = totalW;
                previewCanvas.height = totalH;

                if (hasBorder) {
                    ctx.fillStyle = borderColor;
                    ctx.fillRect(0, 0, totalW, totalH);
                }

                for (let i = 0; i < total; i++) {
                    const r = Math.floor(i / cols);
                    const c = i % cols;
                    const cx = border + c * (cellW + border);
                    const cy = border + r * (cellH + border);
                    const im = loaded[i];
                    const t = imageTransforms[i] || { scale: 1, panX: 0, panY: 0 };
                    const base = Math.min(cellW / im.width, cellH / im.height) || 1;
                    const ds = base * t.scale;
                    const dw = im.width * ds;
                    const dh = im.height * ds;
                    const dx = cx + (cellW - dw)/2 + t.panX;
                    const dy = cy + (cellH - dh)/2 + t.panY;

                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(cx, cy, cellW, cellH);
                    ctx.clip();
                    ctx.drawImage(im, dx, dy, dw, dh);
                    ctx.restore();
                }
            }

            // Show canvas, hide placeholder
            placeholder.style.display = 'none';
            previewCanvas.style.display = 'block';

            downloadBtn.disabled = false;
            copyBtn.disabled = false;
        }

        // Download
        function downloadResult() {
            if (downloadBtn.disabled) return;
            const link = document.createElement('a');
            link.download = 'combined-photo.png';
            link.href = previewCanvas.toDataURL('image/png');
            link.click();
        }

        downloadBtn.addEventListener('click', downloadResult);

        // Copy to clipboard
        let copyFeedbackTimeout = null;

        async function copyResult() {
            if (copyBtn.disabled) return;

            try {
                const blob = await new Promise((resolve, reject) => {
                    previewCanvas.toBlob((result) => {
                        if (result) resolve(result);
                        else reject(new Error('Failed to create image blob'));
                    }, 'image/png');
                });

                await navigator.clipboard.write([
                    new ClipboardItem({ 'image/png': blob })
                ]);

                copyBtnLabel.textContent = 'Copied!';
                clearTimeout(copyFeedbackTimeout);
                copyFeedbackTimeout = setTimeout(() => {
                    copyBtnLabel.textContent = 'Copy to Clipboard';
                }, 2000);
            } catch (err) {
                console.error('Failed to copy image:', err);
                copyBtnLabel.textContent = 'Copy failed';
                clearTimeout(copyFeedbackTimeout);
                copyFeedbackTimeout = setTimeout(() => {
                    copyBtnLabel.textContent = 'Copy to Clipboard';
                }, 2000);
            }
        }

        copyBtn.addEventListener('click', copyResult);

        // Paste image from clipboard into the next empty slot (cycles if full)
        document.addEventListener('paste', (e) => {
            const items = e.clipboardData?.items;
            if (!items) return;

            for (const item of items) {
                if (item.type.startsWith('image/')) {
                    const blob = item.getAsFile();
                    if (!blob) return;

                    e.preventDefault();
                    handleClipboardImage(blob);
                    return;
                }
            }
        });

        // Keyboard shortcut: Cmd+D (Mac) / Ctrl+D (Win/Linux)
        document.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'd') {
                e.preventDefault();
                downloadResult();
            }
        });

        // Initialize uploads and grid UI
        function initGridUI() {
            if (gridSelect) gridSelect.value = `${cols},${rows}`;
            if (customCols) customCols.value = cols;
            if (customRows) customRows.value = rows;
            if (aspectSelect) aspectSelect.value = aspectRatio;
            syncDiagonalDirectionUI();
            updateDiagonalVisibility();
            renderUploads();
            updatePlaceholderText();
        }

        initGridUI();

        // Detect OS for shortcut hint
        const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
        const shortcutHint = document.getElementById('shortcutHint');
        shortcutHint.textContent = isMac ? '⌘D' : 'Ctrl+D';
    </script>
</body>
</html>
